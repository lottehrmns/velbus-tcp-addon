name: "Velbus TCP Bridge"
description: "Bridges a Velbus USB interface to a TCP socket for use with the Home Assistant Velbus integration."
version: "1.0.0"
slug: "velbus_tcp"
init: false

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

# Give the add-on access to USB/serial devices
uart: true

# Expose the TCP port to the HA host so the Velbus integration can connect
ports:
  27015/tcp: 27015
ports_description:
  27015/tcp: "Velbus TCP bridge port"

# User-configurable options shown in the add-on Configuration tab
options:
  serial_autodiscover: true
  serial_port: ""
  tcp_port: 27015
  tcp_auth: false
  tcp_auth_key: ""

schema:
  serial_autodiscover: bool
  serial_port: str
  tcp_port: int
  tcp_auth: bool
  tcp_auth_key: str
